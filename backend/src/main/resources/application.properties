# Datasource
quarkus.datasource.db-kind=postgresql
# Dev Services: Quarkus auto-starts a Postgres container in dev/test mode when no URL is set
# Production URL is injected via DB_URL environment variable
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT
mp.jwt.verify.publickey.location=jwt-public.pem
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=jwt
%dev.auth.cookie.secure=false
mp.jwt.verify.issuer=${JWT_ISSUER:https://api.myapp.com}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:jwt-private.pem}

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type
quarkus.http.cors.exposed-headers=Set-Cookie
quarkus.http.cors.access-control-allow-credentials=true
